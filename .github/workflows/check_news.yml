name: Check TFT News

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

# Artık buna gerek kalmayabilir ama kalsa da zararı olmaz
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5 # v4 -> v5 (Node 24 desteği için)

      - name: Set up Python
        uses: actions/setup-python@v6 # v5 -> v6 (Node 24 desteği için)
        with:
          python-version: '3.12' # 2026'da 3.12 oldukça stabil

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run script
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python tft_news.py

      - name: Commit last news update
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add last_news.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update last news" && git push)
